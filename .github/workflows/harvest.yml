name: 🏦 Central Bank Harvest

on:
  workflow_run:
    # 必须匹配主任务 name
    workflows: ["⚔️ PolyData Dual-Engine System"] 
    types:
      - completed
  workflow_dispatch: # 支持手动触发测试

jobs:
  harvest:
    # 只有手动触发或上游执行成功才运行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: ⏳ 5-Second Buffer
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Waiting 5 seconds for settlement..."
            sleep 5
          else
            echo "Manual trigger, skipping wait."
          fi

      - name: Checkout Scraper Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}
          fetch-depth: 0

      - name: Checkout Central Bank
        uses: actions/checkout@v4
        with:
          repository: wenfp108/Central-Bank
          token: ${{ secrets.MY_PAT }}
          path: central_bank

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏦 Execute Harvest & Wipe
        run: node scripts/archive-poly-to-bank.js

      - name: 📤 Push to Central Bank
        run: |
          cd central_bank
          git config --global user.name 'Architect Bot'
          git config --global user.email 'bot@architect.alpha'
          git add .
          git commit -m "Vault Update: archive polymarket data $(date +%F)" || exit 0
          git pull --rebase
          git push

      - name: 🧹 Sync Deletions to Scraper Repo
        run: |
          git config --global user.name 'Architect Bot'
          git config --global user.email 'bot@architect.alpha'
          git add data/
          git commit -m "Cleanup: Data flushed to Central Bank $(date +%F)" || exit 0
          git pull --rebase
          git push
