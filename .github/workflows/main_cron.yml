name: ⚔️ PolyData Dual-Engine System

on:
  schedule:
    - cron: '33 * * * *'  # 每小时 33 分自动触发
  workflow_dispatch:      # 允许手动触发

jobs:
  engage_targets:
    runs-on: ubuntu-latest

    env:
      MY_PAT: ${{ secrets.MY_PAT }}
      REPO_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache/puppeteer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # ✅ 【关键修改1】开启高速缓存

      # 🔥【核心补全】专门缓存 Puppeteer 下载的浏览器二进制文件
      - name: Cache Puppeteer
        uses: actions/cache@v4
        id: puppeteer-cache
        with:
          path: ${{ github.workspace }}/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      # 🔥【修复版】适配 Ubuntu 24.04 依赖列表
      - name: Install System Dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libgcc-s1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            wget \
            xdg-utils

      - name: Install Project Dependencies
        run: npm ci  # ✅ 【关键修改2】改为 'npm ci'，比 install 快10倍

      # 🎯 Phase 1: Sniper
      - name: 🎯 Run Sniper Engine
        run: node sniper.js
        timeout-minutes: 10

      # ⏳ 战术暂停
      - name: ⏳ Tactical Pause
        run: |
          echo "Cooling down engines..."
          sleep 10

      # 📡 Phase 2: Radar
      - name: 📡 Run Radar Engine
        run: node radar.js
        timeout-minutes: 10
